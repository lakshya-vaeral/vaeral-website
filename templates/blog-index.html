<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Figtree", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #040128;
    color: #dedaff;
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; text-decoration: none; }
  .wrap { max-width: 1040px; margin: 0 auto; padding: 48px 24px 96px; }
  .top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 56px; }
  .top a.home { font-weight: 600; font-size: 15px; color: #9b9bbd; }
  .top a.home:hover { color: #fff; }
  .brand img { height: 28px; display: block; }
  h1.title { font-size: clamp(34px, 5vw, 52px); font-weight: 700; letter-spacing: -0.02em; margin: 0 0 8px; color: #fff; }
  p.lede { font-size: 18px; color: #9b9bbd; margin: 0 0 48px; max-width: 60ch; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 28px; }
  .card {
    display: flex; flex-direction: column;
    background: rgba(119, 117, 153, 0.08);
    border: 1px solid rgba(119, 117, 153, 0.28);
    border-radius: 14px; overflow: hidden;
    transition: border-color .2s ease, transform .2s ease;
  }
  .card:hover { border-color: rgba(119, 117, 153, 0.6); transform: translateY(-2px); }
  .card .cover { aspect-ratio: 16 / 9; width: 100%; object-fit: cover; background: #0d0a3a; display: block; }
  .card .body { padding: 22px 22px 26px; display: flex; flex-direction: column; gap: 10px; flex: 1; }
  .card .meta { font-size: 13px; color: #9b9bbd; display: flex; gap: 10px; align-items: center; }
  .card .meta .dot { width: 3px; height: 3px; border-radius: 50%; background: #9b9bbd; }
  .card h2 { font-size: 20px; font-weight: 600; line-height: 1.3; margin: 0; color: #fff; letter-spacing: -0.01em; }
  .card p.excerpt { font-size: 15px; line-height: 1.55; color: #b9b7d4; margin: 0; }
  .card .more { margin-top: auto; padding-top: 6px; font-weight: 600; font-size: 14px; color: #fff; }
  .empty { color: #9b9bbd; font-size: 17px; }
</style>
