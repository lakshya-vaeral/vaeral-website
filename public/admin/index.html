<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaeral CMS Hub</title>
    <style>
        :root {
            --bg: #09090b;
            --surface: #18181b;
            --border: #27272a;
            --text: #fafafa;
            --text-dim: #a1a1aa;
            --primary: #ffffff;
            --primary-hover: #e4e4e7;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 600;
        }

        .btn {
            background: var(--primary);
            color: var(--bg);
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            transition: background 0.2s;
        }

        .btn:hover {
            background: var(--primary-hover);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            display: flex;
            flex-direction: column;
        }

        .card h3 {
            margin: 0 0 12px 0;
            font-size: 18px;
        }

        .card p {
            color: var(--text-dim);
            font-size: 14px;
            margin: 0 0 20px 0;
            flex-grow: 1;
        }

        .card-actions {
            display: flex;
            gap: 12px;
        }

        .card-actions a {
            background: #27272a;
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s;
            text-align: center;
            flex: 1;
        }

        .card-actions a:hover {
            background: #3f3f46;
        }

        .card-actions a.view-btn {
            background: transparent;
            border: 1px solid var(--border);
        }

        .card-actions a.view-btn:hover {
            border-color: var(--text-dim);
        }

        #loading {
            text-align: center;
            color: var(--text-dim);
            padding: 40px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Vaeral Blog CMS</h1>
            <a href="/admin/editor.html" class="btn">Create New Post</a>
        </div>

        <div id="loading">Loading posts...</div>
        <div class="grid" id="posts-grid"></div>
    </div>

    <script>
        async function loadPosts() {
            try {
                const res = await fetch('/admin/posts.json');
                if (!res.ok) throw new Error('No posts manifest found');
                
                const posts = await res.json();
                const grid = document.getElementById('posts-grid');
                document.getElementById('loading').style.display = 'none';

                if (posts.length === 0) {
                    grid.innerHTML = '<p style="color: #a1a1aa">No posts published yet.</p>';
                    return;
                }

                posts.forEach(post => {
                    const date = new Date(post.date).toLocaleDateString();
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <h3>${post.title}</h3>
                        <p>Published: ${date}<br>Slug: /blog/${post.slug}</p>
                        <div class="card-actions">
                            <a href="/admin/editor.html?slug=${post.slug}">Edit</a>
                            <a href="/blog/${post.slug}" class="view-btn" target="_blank">View Live</a>
                        </div>
                    `;
                    grid.appendChild(card);
                });

            } catch (err) {
                document.getElementById('loading').innerText = 'No published posts yet (or build has not completed).';
            }
        }

        loadPosts();
    </script>
</body>
</html>
