<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Keep this admin out of search results. -->
  <meta name="robots" content="noindex" />
  <title>Vaeral CMS</title>
  <!-- Load config from an absolute path. Without this, visiting /admin (no
       trailing slash) makes Decap fetch /config.yml at the site root → 404. -->
  <link href="/admin/config.yml" type="text/yaml" rel="cms-config-url" />
</head>
<body>
  <!-- Decap CMS — the entire editor UI. Config lives in ./config.yml -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
